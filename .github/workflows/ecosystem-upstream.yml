name: ecosystem-upstream
on:
  repository_dispatch:
    types: [lic-release, lit-release, lip-release]
  workflow_dispatch:
    inputs:
      upstream:
        required: true
        type: string
      version:
        required: true
        type: string
permissions:
  contents: read
  issues: write
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Open tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UP="${{ github.event.client_payload.repo || inputs.upstream }}"
          VER="${{ github.event.client_payload.version || inputs.version }}"
          TITLE="ecosystem: bump pins for ${UP} ${VER}"
          BODY="Upstream **\`${UP}\`** released **\`${VER}\`**.\n\n- [ ] Update \`li-toolchain.toml\`\n- [ ] Run CI\n- [ ] CHANGELOG.md"
          N="$(gh issue list --search "in:title ${TITLE}" --state open --json number -q '.[0].number' 2>/dev/null || true)"
          if [[ -n "$N" && "$N" != "null" ]]; then
            gh issue comment "$N" --body "Reminder: bump pins for ${VER}."
          else
            gh issue create --title "$TITLE" --body "$BODY" --label ecosystem-upstream 2>/dev/null || \
              gh issue create --title "$TITLE" --body "$BODY"
          fi
